
<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 2 – Coffee Order Form</title>
</head>

<body>
    <header>
        <h1>Coffee Order Form</h1>

        <p>
            Complete the form below to place your coffee order.
        </p>
    </header>

    <main>
        <form action="https://www.w3schools.com/action_page.php" method="get">
            <p>
                <label for="customer-name">Customer Name:</label>

                <input
                    type="text"
                    id="customer-name"
                    name="customer_name">
            </p>

            <p>
                <label for="email">Email Address:</label>

                <input
                    type="email"
                    id="email"
                    name="email">
            </p>

            <p>
                <label for="coffee-type">Coffee Type:</label>

                <select id="coffee-type" name="coffee_type">
                    <option value="latte">Latte</option>
                    <option value="cappuccino">Cappuccino</option>
                    <option value="americano">Americano</option>
                    <option value="mocha">Mocha</option>
                </select>
            </p>

            <fieldset>
                <legend>Size</legend>

                <input
                    type="radio"
                    id="small"
                    name="size"
                    value="small">

                <label for="small">Small</label>

                <input
                    type="radio"
                    id="medium"
                    name="size"
                    value="medium">

                <label for="medium">Medium</label>

                <input
                    type="radio"
                    id="large"
                    name="size"
                    value="large">

                <label for="large">Large</label>
            </fieldset>

            <fieldset>
                <legend>Extras</legend>

                <input
                    type="checkbox"
                    id="whipped-cream"
                    name="extras"
                    value="whipped_cream">

                <label for="whipped-cream">Whipped Cream</label>

                <input
                    type="checkbox"
                    id="extra-shot"
                    name="extras"
                    value="extra_shot">

                <label for="extra-shot">Extra Shot</label>

                <input
                    type="checkbox"
                    id="almond-milk"
                    name="extras"
                    value="almond_milk">

                <label for="almond-milk">Almond Milk</label>
            </fieldset>

            <p>
                <label for="instructions">Special Instructions:</label>
            </p>

            <p>
                <textarea
                    id="instructions"
                    name="special_instructions"
                    rows="5"
                    cols="40"></textarea>
            </p>

            <p>
                <button type="submit">Submit Order</button>
            </p>
        </form>

        <p>
            <a href="lab2-home.html">Return to the Lab 2 Home Page</a>
        </p>
    </main>

    <footer>
        <p>Created by Allison Hernandez</p>
    </footer>
</body>
</html>
